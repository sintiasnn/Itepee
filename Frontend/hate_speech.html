{% extends "Layout/main.html" %} {% block content %}
<section style="padding: 8rem 0 4rem;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8 text-center mb-5">
        <span class="status-badge hate mb-3">&#9888; Terdeteksi Ujaran Kebencian</span>
        <h2 class="display-5 fw-bold text-danger mt-2">Oh Tidak!!</h2>
        <p class="text-muted">Tweet terdeteksi sebagai ujaran kebencian. Berikut detail prediksinya:</p>
      </div>
    </div>

    <div class="row justify-content-center mb-4">
      <div class="col-lg-8">
        <div class="card shadow-sm p-4">
          <p class="text-muted mb-1 small">Tweet Anda:</p>
          <p class="tweet-quote mb-0">{{ tweet }}</p>
        </div>
      </div>
    </div>

    <div class="row justify-content-center g-3 mb-5">
      <div class="col-md-4">
        <div class="card shadow-sm h-100">
          <div class="card-body text-center py-4">
            <p class="text-muted small mb-1">Sasaran</p>
            <h4 class="fw-bold text-danger mb-0">{{ target }}</h4>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm h-100">
          <div class="card-body text-center py-4">
            <p class="text-muted small mb-1">Jenis</p>
            <h4 class="fw-bold text-danger mb-0">{{ type }}</h4>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm h-100">
          <div class="card-body text-center py-4">
            <p class="text-muted small mb-1">Tingkat</p>
            <h4 class="fw-bold text-danger mb-0">{{ level }}</h4>
          </div>
        </div>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="d-flex gap-3 justify-content-center">
          <a class="btn btn-primary btn-lg flex-fill" href="/detail_hs">Selengkapnya</a>
          <a class="btn btn-outline-primary btn-lg flex-fill" href="/predict">Coba Lagi</a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
