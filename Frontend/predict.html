{% extends "Layout/main.html" %} {% block content %}
<section style="padding: 8rem 0 4rem;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="text-center mb-4">
          <h2 class="fw-bold section-title">Cek Tweet Kamu</h2>
          <p class="text-muted">Masukkan tweet untuk diperiksa oleh sistem prediksi kami</p>
        </div>
        <div class="card shadow-sm p-4">
          <form method="POST" id="predictForm">
            {% csrf_token %}
            <div class="mb-3">
              <textarea class="form-control" rows="4" name="raw_tweet" placeholder="Tulis tweet di sini..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg" id="predictBtn">
              Prediksi Sekarang
            </button>
          </form>
          <div id="loading" class="text-center mt-4" style="display: none;">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
              <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted fw-medium">Sedang menganalisis tweet...</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  document.getElementById('predictForm').addEventListener('submit', function() {
    var btn = document.getElementById('predictBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span>Memproses...';
    document.getElementById('loading').style.display = 'block';
  });
</script>
{% endblock %}
